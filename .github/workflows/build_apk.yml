name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Télécharger les polices Google Fonts
        run: |
          mkdir -p assets/fonts
          pip install requests --quiet
          python3 - << 'EOF'
          import urllib.request, zipfile, os, shutil

          fonts = {
            "Cinzel": "https://fonts.google.com/download?family=Cinzel",
            "Crimson_Text": "https://fonts.google.com/download?family=Crimson+Text"
          }

          needed = {
            "Cinzel-Regular.ttf": "Cinzel-Regular.ttf",
            "Cinzel-SemiBold.ttf": "Cinzel-SemiBold.ttf",
            "Cinzel-Bold.ttf": "Cinzel-Bold.ttf",
            "CrimsonText-Regular.ttf": "CrimsonText-Regular.ttf",
            "CrimsonText-SemiBold.ttf": "CrimsonText-SemiBold.ttf",
            "CrimsonText-Italic.ttf": "CrimsonText-Italic.ttf",
          }

          for family, url in fonts.items():
            zip_path = f"/tmp/{family}.zip"
            print(f"Downloading {family}...")
            urllib.request.urlretrieve(url, zip_path)
            with zipfile.ZipFile(zip_path, 'r') as z:
              for name in z.namelist():
                base = os.path.basename(name)
                if base in needed:
                  with z.open(name) as src, open(f"assets/fonts/{base}", 'wb') as dst:
                    dst.write(src.read())
                  print(f"  extracted: {base}")

          missing = [f for f in needed if not os.path.exists(f"assets/fonts/{f}")]
          if missing:
            print(f"Still missing: {missing}")
          else:
            print("All fonts ready.")
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
