name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Supprimer le dossier android existant
        run: rm -rf android

      - name: Recréer le projet Android avec Flutter
        run: flutter create --platforms android --project-name ldvelh .

      - name: Restaurer l'applicationId correct
        run: |
          sed -i 's/com.example.ldvelh/com.graal.chateau_tenebres/g' \
            android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' \
            android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/g' \
            android/app/build.gradle
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' \
            android/app/build.gradle

      - name: flutter pub get
        run: flutter pub get

      - name: Vérifier la syntaxe Dart
        run: flutter analyze --no-fatal-infos 2>&1 | tail -30

      - name: Build APK debug avec logs verbeux
        run: flutter build apk --debug --verbose 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
