name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Supprimer le dossier android existant
        run: rm -rf android

      - name: Recréer le projet Android avec Flutter
        run: flutter create --platforms android --project-name ldvelh .

      - name: Restaurer l'applicationId correct
        run: |
          sed -i 's/com.example.ldvelh/com.graal.chateau_tenebres/g' \
            android/app/build.gradle

      - name: flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
